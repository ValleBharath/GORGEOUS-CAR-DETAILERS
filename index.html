<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root">
      <div id="debug-log" style="position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace; font-size: 10px; z-index: 9999; max-height: 200px; overflow: auto; display: none;"></div>
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #666;">
        Loading Gorgeous Car Detailers...
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var debug = document.getElementById('debug-log');
        if (debug) {
          debug.style.display = 'block';
          debug.innerHTML += '<div>ERROR: ' + msg + ' at ' + url + ':' + line + '</div>';
        }
        return false;
      };
      window.onunhandledrejection = function(event) {
        var debug = document.getElementById('debug-log');
        if (debug) {
          debug.style.display = 'block';
          debug.innerHTML += '<div>REJECTION: ' + event.reason + '</div>';
        }
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
